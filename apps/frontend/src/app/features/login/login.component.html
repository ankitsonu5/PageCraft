<div
  class="min-h-screen bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center p-4"
>
  <div class="card w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 bg-brand-500 rounded-2xl mb-4"
      >
        <svg
          class="w-9 h-9 text-white"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">PageCraft</h1>
      <p class="text-sm text-gray-500 mt-1">Agency Landing Page Builder</p>
    </div>

    <!-- Error -->
    @if (error()) {
      <div
        class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"
      >
        {{ error() }}
      </div>
    }

    <!-- Form -->
    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="label">Email</label>
        <input
          type="email"
          class="input"
          placeholder="Enter your email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          autocomplete="email"
          required
        />
      </div>

      <div>
        <label class="label">Password</label>
        <input
          type="password"
          class="input"
          placeholder="••••••••"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn-primary w-full btn-lg mt-2"
        [disabled]="loading()"
      >
        @if (loading()) {
          <svg
            class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
          Logging in...
        } @else {
          Login
        }
      </button>
    </form>
  </div>
</div>
