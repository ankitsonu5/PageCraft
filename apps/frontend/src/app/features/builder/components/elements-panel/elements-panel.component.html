<div class="p-4">
  <!-- Search -->
  <div class="relative mb-5">
    <svg
      class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
      />
    </svg>
    <input
      type="text"
      class="w-full pl-9 pr-3 py-2 text-xs bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all"
      placeholder="Search elements..."
      [ngModel]="search()"
      (ngModelChange)="search.set($event)"
      name="search"
    />
  </div>

  <!-- Categories -->
  @for (cat of categories; track cat[0]) {
    <div class="mb-5">
      <p
        class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2.5 flex items-center justify-between"
      >
        <span>{{ cat[0] }}</span>
        <span class="w-1.5 h-1.5 rounded-full bg-brand-400"></span>
      </p>
      <div class="grid grid-cols-2 gap-2">
        @for (el of cat[1]; track el.type) {
          <button
            (click)="addSection.emit(el.type)"
            class="flex flex-col items-center justify-center gap-1.5 p-3 rounded-2xl border border-gray-200/80 bg-white hover:border-brand-400 hover:shadow-md hover:shadow-brand-500/10 hover:-translate-y-0.5 transition-all duration-200 group text-center"
          >
            <span class="text-xl group-hover:scale-110 transition-transform duration-200">{{ el.icon }}</span>
            <span
              class="text-xs font-medium text-gray-700 group-hover:text-brand-600 leading-tight"
            >
              {{ el.label }}
            </span>
          </button>
        }
      </div>
    </div>
  }

  @if (categories.length === 0) {
    <div class="text-center py-8">
      <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 text-sm">
        🔍
      </div>
      <p class="text-xs font-medium text-gray-500">No elements found</p>
    </div>
  }
</div>
