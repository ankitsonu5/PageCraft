<div class="p-4">
  <!-- Search -->
  <div class="relative mb-4">
    <svg
      class="w-4 h-4 text-gray-400 absolute left-2.5 top-1/2 -translate-y-1/2"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
      />
    </svg>
    <input
      type="text"
      class="input pl-8 text-sm"
      placeholder="Search elements..."
      [ngModel]="search()"
      (ngModelChange)="search.set($event)"
      name="search"
    />
  </div>

  <!-- Categories -->
  @for (cat of categories; track cat[0]) {
    <div class="mb-4">
      <p
        class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2"
      >
        {{ cat[0] }}
      </p>
      <div class="grid grid-cols-2 gap-2">
        @for (el of cat[1]; track el.type) {
          <button
            (click)="addSection.emit(el.type)"
            class="flex flex-col items-center justify-center gap-1 p-3 rounded-xl border border-gray-200 hover:border-brand-400 hover:bg-brand-50 transition-all group text-center"
          >
            <span class="text-xl">{{ el.icon }}</span>
            <span
              class="text-xs font-medium text-gray-700 group-hover:text-brand-600 leading-tight"
            >
              {{ el.label }}
            </span>
          </button>
        }
      </div>
    </div>
  }

  @if (categories.length === 0) {
    <p class="text-sm text-gray-400 text-center py-4">No elements found</p>
  }
</div>
